<!DOCTYPE html>
<html lang="pr-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
<style>
    * {
    margin: 0;
    box-sizing: border-box;
    }

    body {
        margin: 1em;
    }

.box {
    background-color: rgb(248, 141, 11);
    border: 1px solid black;
    padding: 10px;
    border-radius: 5%;
    
}

.container {
    display: grid;
    grid-template-columns: auto;
    grid-auto-rows: 100px;
    grid-gap: 10px;     
    grid-template-areas: 
    "box-1 box-1 box-1 box-1"
    "box-3 box-2 box-2 box-2"
    "box-3 box-2 box-2 box-2"
    "box-4 box-4 box-4 box-4";
    
}
 
.box-1{
    grid-area: box-1;

    
    
}
.box-2{
    grid-area: box-2;
    
}
.box-3{
    grid-area: box-3;

}
.box-4{
    grid-area: box-4;
}



</style>
    
</head>
<body>
    <div class="container">
       <div class="box box-1">Logo tipo </div>
       <div class="box box-2">Sidebar</div>
       <div class="box box-3">Main</div>
       <div class="box box-4">Footer</div>

    </div>
    
</body>
</html>
